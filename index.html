<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>英単語帳</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --muted: rgba(240,237,232,0.45);
    --green: #3ecf8e;
    --red: #f56565;
    --accent: #c8b8ff;
    --accent-dim: rgba(200,184,255,0.12);
    --radius: 24px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Header ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px 8px;
    flex-shrink: 0;
  }
  .title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .session-badge {
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-dim);
    border-radius: 20px;
    padding: 4px 10px;
  }

  /* ── Progress bar ── */
  .progress-wrap {
    padding: 0 20px 12px;
    flex-shrink: 0;
  }
  .progress-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ── Stats ── */
  .stats {
    display: flex;
    gap: 10px;
    padding: 0 20px 12px;
    flex-shrink: 0;
  }
  .stat {
    flex: 1;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    text-align: center;
  }
  .stat-num {
    font-size: 22px;
    font-weight: 600;
    line-height: 1;
  }
  .stat-num.green { color: var(--green); }
  .stat-num.red   { color: var(--red); }
  .stat-num.gray  { color: var(--muted); }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ── Card area ── */
  .card-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    position: relative;
    overflow: hidden;
  }

  .card {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 28px;
    text-align: center;
    position: relative;
    cursor: pointer;
    user-select: none;
    transition: transform 0.08s ease;
    will-change: transform;
  }
  .card:active { transform: scale(0.98); }

  .card-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .word {
    font-family: 'DM Serif Display', serif;
    font-size: 38px;
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 8px;
    word-break: break-word;
  }

  .phonetic {
    font-size: 15px;
    color: var(--muted);
    min-height: 20px;
    margin-bottom: 20px;
  }

  .meaning-wrap {
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .meaning {
    font-size: 18px;
    font-weight: 500;
    color: var(--accent);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    line-height: 1.5;
  }
  .meaning.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .tap-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 20px;
    transition: opacity 0.3s;
  }

  /* Swipe overlays */
  .swipe-overlay {
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    opacity: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 700;
    transition: opacity 0.1s;
    pointer-events: none;
  }
  .swipe-overlay.good {
    background: rgba(62,207,142,0.15);
    color: var(--green);
    border: 2px solid rgba(62,207,142,0.4);
  }
  .swipe-overlay.bad {
    background: rgba(245,101,101,0.12);
    color: var(--red);
    border: 2px solid rgba(245,101,101,0.3);
  }

  /* ── Swipe guide ── */
  .swipe-guide {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 20px 8px;
    flex-shrink: 0;
  }
  .guide-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .guide-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .guide-icon.bad  { background: rgba(245,101,101,0.15); }
  .guide-icon.good { background: rgba(62,207,142,0.15); }

  /* ── Action buttons ── */
  .actions {
    display: flex;
    gap: 12px;
    padding: 8px 20px 20px;
    flex-shrink: 0;
  }
  .btn {
    flex: 1;
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
  }
  .btn:active { transform: scale(0.96); opacity: 0.85; }
  .btn-bad  { background: rgba(245,101,101,0.15); color: var(--red); }
  .btn-good { background: rgba(62,207,142,0.15); color: var(--green); }
  .btn-skip { background: var(--surface2); color: var(--muted); flex: 0 0 60px; }

  /* ── Loading / Error ── */
  .loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 99;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(245,101,101,0.12);
    border: 1px solid rgba(245,101,101,0.3);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    margin: 20px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--red);
  }

  /* ── Done screen ── */
  .done-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    display: none;
  }
  .done-emoji { font-size: 64px; }
  .done-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--text);
  }
  .done-sub { font-size: 15px; color: var(--muted); text-align: center; padding: 0 20px; }
  .btn-restart {
    margin-top: 20px;
    background: var(--accent-dim);
    color: var(--accent);
    border: none;
    border-radius: 16px;
    padding: 16px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }

  /* slide animation */
  @keyframes slideLeft {
    from { transform: translateX(0); opacity: 1; }
    to   { transform: translateX(-120%); opacity: 0; }
  }
  @keyframes slideRight {
    from { transform: translateX(0); opacity: 1; }
    to   { transform: translateX(120%); opacity: 0; }
  }
  @keyframes slideIn {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  .anim-left  { animation: slideLeft  0.3s ease forwards; }
  .anim-right { animation: slideRight 0.3s ease forwards; }
  .anim-in    { animation: slideIn    0.3s ease forwards; }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p style="font-size:14px;color:var(--muted)">単語を読み込み中…</p>
</div>

<!-- Done -->
<div class="done-screen" id="doneScreen">
  <div class="done-emoji">🎉</div>
  <div class="done-title">セッション完了！</div>
  <p class="done-sub" id="doneMsg"></p>
  <button class="btn-restart" onclick="restart()">もう一度やる</button>
</div>

<!-- Header -->
<div class="header">
  <div class="title">単語帳</div>
  <div class="session-badge" id="sessionBadge">— / —</div>
</div>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-label">
    <span id="progressLeft">0 / 0</span>
    <span id="progressRight">残り 0枚</span>
  </div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat">
    <div class="stat-num green" id="statKnown">0</div>
    <div class="stat-label">覚えた</div>
  </div>
  <div class="stat">
    <div class="stat-num red" id="statRetry">0</div>
    <div class="stat-label">要復習</div>
  </div>
  <div class="stat">
    <div class="stat-num gray" id="statTotal">0</div>
    <div class="stat-label">合計</div>
  </div>
</div>

<!-- Card -->
<div class="card-area">
  <div class="card" id="card">
    <div class="swipe-overlay good" id="overlayGood">覚えた ✓</div>
    <div class="swipe-overlay bad"  id="overlayBad">復習する ↩</div>

    <div class="card-tag" id="cardTag">英語</div>
    <div class="word"    id="wordEl">---</div>
    <div class="phonetic" id="phoneticEl"></div>
    <div class="meaning-wrap">
      <div class="meaning" id="meaningEl"></div>
    </div>
    <div class="tap-hint" id="tapHint">タップして意味を見る</div>
  </div>
</div>

<!-- Swipe guide -->
<div class="swipe-guide">
  <div class="guide-item">
    <div class="guide-icon bad">←</div>
    <span>要復習</span>
  </div>
  <div class="guide-item">
    <span>覚えた</span>
    <div class="guide-icon good">→</div>
  </div>
</div>

<!-- Buttons -->
<div class="actions">
  <button class="btn btn-bad"  onclick="judge(false)">← 復習</button>
  <button class="btn btn-skip" onclick="skipCard()">skip</button>
  <button class="btn btn-good" onclick="judge(true)">覚えた →</button>
</div>

<script>
const SHEET_ID = "15BpwIs7lGNiyUAh_LtCcEqYiuLPibMhjpPOdyzjvX50";
const URLS = [
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`,
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=330002620`
];

let words   = [];
let queue   = [];
let cur     = 0;
let shown   = false;
let knownN  = 0;
let retryN  = 0;
let stats   = JSON.parse(localStorage.getItem("vocabStats") || "{}");

// ── CSV parser (handles quoted commas) ──────────────────────────
function parseCSV(text) {
  return text.split(/\r?\n/).slice(1).map(line => {
    if (!line.trim()) return null;
    const cols = [];
    let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ""; continue; }
      cur += c;
    }
    cols.push(cur.trim());
    const word    = cols[0] || "";
    const meaning = cols[1] || "";
    return word ? { word, meaning } : null;
  }).filter(Boolean);
}

async function loadAll() {
  const results = await Promise.all(URLS.map(u =>
    fetch(u).then(r => r.text()).catch(() => "")
  ));
  return results.flatMap(parseCSV);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function init() {
  loadAll().then(data => {
    words = data;
    shuffle(words);
    queue = [...words];
    cur   = 0;
    document.getElementById("loading").style.display = "none";
    document.getElementById("statTotal").textContent = words.length;
    showCard();
  }).catch(() => {
    document.getElementById("loading").innerHTML =
      `<div class="error-box">単語の読み込みに失敗しました。<br>インターネット接続を確認してください。</div>`;
  });
}

function showCard() {
  if (cur >= queue.length) { showDone(); return; }
  const w = queue[cur];
  shown = false;

  const wordEl    = document.getElementById("wordEl");
  const meaningEl = document.getElementById("meaningEl");
  const tapHint   = document.getElementById("tapHint");
  const badge     = document.getElementById("sessionBadge");
  const pFill     = document.getElementById("progressFill");
  const pLeft     = document.getElementById("progressLeft");
  const pRight    = document.getElementById("progressRight");

  wordEl.textContent    = w.word;
  meaningEl.textContent = w.meaning;
  meaningEl.classList.remove("visible");
  tapHint.style.opacity = "1";

  // update progress
  const pct = Math.round((cur / queue.length) * 100);
  pFill.style.width   = pct + "%";
  pLeft.textContent   = `${cur} / ${queue.length}`;
  pRight.textContent  = `残り ${queue.length - cur}枚`;
  badge.textContent   = `${cur + 1} / ${queue.length}`;

  document.getElementById("statKnown").textContent = knownN;
  document.getElementById("statRetry").textContent = retryN;
}

function revealMeaning() {
  if (shown) return;
  shown = true;
  document.getElementById("meaningEl").classList.add("visible");
  document.getElementById("tapHint").style.opacity = "0";
  speak(queue[cur].word);
}

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

function judge(good) {
  const w = queue[cur];
  if (good) {
    stats[w.word] = 1;
    knownN++;
    animCard("anim-right");
  } else {
    stats[w.word] = 0;
    retryN++;
    // push to end for retry
    queue.push(w);
    animCard("anim-left");
  }
  localStorage.setItem("vocabStats", JSON.stringify(stats));
  setTimeout(() => { cur++; showCard(); }, 300);
}

function skipCard() {
  animCard("anim-left");
  setTimeout(() => { cur++; showCard(); }, 300);
}

function animCard(cls) {
  const card = document.getElementById("card");
  card.classList.add(cls);
  setTimeout(() => {
    card.classList.remove(cls);
    card.classList.add("anim-in");
    setTimeout(() => card.classList.remove("anim-in"), 350);
  }, 300);
}

function showDone() {
  const done = document.getElementById("doneScreen");
  document.getElementById("doneMsg").textContent =
    `覚えた: ${knownN}語 ／ 要復習: ${retryN}語（全${words.length}語）`;
  done.style.display = "flex";
}

function restart() {
  knownN = 0; retryN = 0;
  shuffle(words);
  queue = [...words];
  cur   = 0;
  document.getElementById("doneScreen").style.display = "none";
  showCard();
}

// ── Touch / Swipe ────────────────────────────────────────────────
let startX = 0, startY = 0, dragging = false;
const card = document.getElementById("card");
const oGood = document.getElementById("overlayGood");
const oBad  = document.getElementById("overlayBad");

card.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
  dragging = false;
}, { passive: true });

card.addEventListener("touchmove", e => {
  const dx = e.touches[0].clientX - startX;
  const dy = e.touches[0].clientY - startY;
  if (Math.abs(dx) < 8 && !dragging) return;
  dragging = true;
  card.style.transform = `translateX(${dx * 0.4}px) rotate(${dx * 0.02}deg)`;
  const strength = Math.min(Math.abs(dx) / 80, 1);
  if (dx > 20) {
    oGood.style.opacity = strength;
    oBad.style.opacity  = 0;
  } else if (dx < -20) {
    oBad.style.opacity  = strength;
    oGood.style.opacity = 0;
  } else {
    oGood.style.opacity = oBad.style.opacity = 0;
  }
}, { passive: true });

card.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - startX;
  const dy = e.changedTouches[0].clientY - startY;
  card.style.transform = "";
  oGood.style.opacity = oBad.style.opacity = 0;

  if (!dragging && Math.abs(dx) < 10 && Math.abs(dy) < 10) {
    revealMeaning();
    return;
  }
  if (dx >  60) { judge(true);  return; }
  if (dx < -60) { judge(false); return; }
}, { passive: true });

// ── Service Worker ──────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

init();
</script>
</body>
</html>
